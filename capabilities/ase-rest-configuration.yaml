naftiko: 1.0.0-alpha2
info:
  label: Sybase ASE REST API — Configuration
  description: 'Sybase ASE REST API — Configuration. 2 operations. Lead operation: Get Server Configuration. Self-contained
    Naftiko capability covering one Sybase business surface.'
  tags:
  - Sybase
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYBASE_API_KEY: SYBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ase-rest-configuration
    baseUri: https://{server}:{port}/ase/v1
    description: Sybase ASE REST API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: servers-serverId-configuration
      path: /servers/{serverId}/configuration
      operations:
      - name: getconfiguration
        method: GET
        description: Get Server Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: group
          in: query
          type: string
          description: Filter configuration parameters by group name.
      - name: updateconfiguration
        method: PUT
        description: Update Server Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SYBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ase-rest-configuration-rest
    port: 8080
    description: REST adapter for Sybase ASE REST API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/servers/{serverid}/configuration
      name: servers-serverid-configuration
      description: REST surface for servers-serverId-configuration.
      operations:
      - method: GET
        name: getconfiguration
        description: Get Server Configuration
        call: ase-rest-configuration.getconfiguration
        with:
          group: rest.group
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateconfiguration
        description: Update Server Configuration
        call: ase-rest-configuration.updateconfiguration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ase-rest-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sybase ASE REST API — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-server-configuration
      description: Get Server Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-configuration.getconfiguration
      with:
        group: tools.group
      outputParameters:
      - type: object
        mapping: $.
    - name: update-server-configuration
      description: Update Server Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ase-rest-configuration.updateconfiguration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
