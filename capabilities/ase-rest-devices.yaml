naftiko: 1.0.0-alpha2
info:
  label: Sybase ASE REST API — Devices
  description: 'Sybase ASE REST API — Devices. 1 operations. Lead operation: List Database Devices. Self-contained Naftiko
    capability covering one Sybase business surface.'
  tags:
  - Sybase
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYBASE_API_KEY: SYBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ase-rest-devices
    baseUri: https://{server}:{port}/ase/v1
    description: Sybase ASE REST API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: servers-serverId-devices
      path: /servers/{serverId}/devices
      operations:
      - name: listdevices
        method: GET
        description: List Database Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SYBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ase-rest-devices-rest
    port: 8080
    description: REST adapter for Sybase ASE REST API — Devices. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/servers/{serverid}/devices
      name: servers-serverid-devices
      description: REST surface for servers-serverId-devices.
      operations:
      - method: GET
        name: listdevices
        description: List Database Devices
        call: ase-rest-devices.listdevices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ase-rest-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sybase ASE REST API — Devices. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-database-devices
      description: List Database Devices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-devices.listdevices
      outputParameters:
      - type: object
        mapping: $.
