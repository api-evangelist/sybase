naftiko: 1.0.0-alpha2
info:
  label: Sybase ASE REST API — Servers
  description: 'Sybase ASE REST API — Servers. 3 operations. Lead operation: List ASE Servers. Self-contained Naftiko capability
    covering one Sybase business surface.'
  tags:
  - Sybase
  - Servers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYBASE_API_KEY: SYBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ase-rest-servers
    baseUri: https://{server}:{port}/ase/v1
    description: Sybase ASE REST API — Servers business capability. Self-contained, no shared references.
    resources:
    - name: servers
      path: /servers
      operations:
      - name: listservers
        method: GET
        description: List ASE Servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servers-serverId
      path: /servers/{serverId}
      operations:
      - name: getserver
        method: GET
        description: Get Server Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: servers-serverId-status
      path: /servers/{serverId}/status
      operations:
      - name: getserverstatus
        method: GET
        description: Get Server Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SYBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ase-rest-servers-rest
    port: 8080
    description: REST adapter for Sybase ASE REST API — Servers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/servers
      name: servers
      description: REST surface for servers.
      operations:
      - method: GET
        name: listservers
        description: List ASE Servers
        call: ase-rest-servers.listservers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers/{serverid}
      name: servers-serverid
      description: REST surface for servers-serverId.
      operations:
      - method: GET
        name: getserver
        description: Get Server Details
        call: ase-rest-servers.getserver
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers/{serverid}/status
      name: servers-serverid-status
      description: REST surface for servers-serverId-status.
      operations:
      - method: GET
        name: getserverstatus
        description: Get Server Status
        call: ase-rest-servers.getserverstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ase-rest-servers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sybase ASE REST API — Servers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-ase-servers
      description: List ASE Servers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-servers.listservers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-server-details
      description: Get Server Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-servers.getserver
      outputParameters:
      - type: object
        mapping: $.
    - name: get-server-status
      description: Get Server Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-servers.getserverstatus
      outputParameters:
      - type: object
        mapping: $.
