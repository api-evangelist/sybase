naftiko: 1.0.0-alpha2
info:
  label: Sybase ASE REST API — Databases
  description: 'Sybase ASE REST API — Databases. 3 operations. Lead operation: List Databases. Self-contained Naftiko capability
    covering one Sybase business surface.'
  tags:
  - Sybase
  - Databases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYBASE_API_KEY: SYBASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ase-rest-databases
    baseUri: https://{server}:{port}/ase/v1
    description: Sybase ASE REST API — Databases business capability. Self-contained, no shared references.
    resources:
    - name: servers-serverId-databases
      path: /servers/{serverId}/databases
      operations:
      - name: listdatabases
        method: GET
        description: List Databases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdatabase
        method: POST
        description: Create a Database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: servers-serverId-databases-databaseName
      path: /servers/{serverId}/databases/{databaseName}
      operations:
      - name: getdatabase
        method: GET
        description: Get Database Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SYBASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ase-rest-databases-rest
    port: 8080
    description: REST adapter for Sybase ASE REST API — Databases. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/servers/{serverid}/databases
      name: servers-serverid-databases
      description: REST surface for servers-serverId-databases.
      operations:
      - method: GET
        name: listdatabases
        description: List Databases
        call: ase-rest-databases.listdatabases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdatabase
        description: Create a Database
        call: ase-rest-databases.createdatabase
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/servers/{serverid}/databases/{databasename}
      name: servers-serverid-databases-databasename
      description: REST surface for servers-serverId-databases-databaseName.
      operations:
      - method: GET
        name: getdatabase
        description: Get Database Details
        call: ase-rest-databases.getdatabase
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ase-rest-databases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sybase ASE REST API — Databases. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-databases
      description: List Databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-databases.listdatabases
      outputParameters:
      - type: object
        mapping: $.
    - name: create-database
      description: Create a Database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ase-rest-databases.createdatabase
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-database-details
      description: Get Database Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ase-rest-databases.getdatabase
      outputParameters:
      - type: object
        mapping: $.
