naftiko: "1.0.0-alpha1"

info:
  label: "Sybase ASE REST API"
  description: >-
    REST API for SAP Adaptive Server Enterprise (ASE) administration and
    monitoring. Provides programmatic access to server management, database
    administration, performance monitoring, user management, and backup
    operations.
  tags:
    - Administration
    - Database Management
    - Monitoring
    - SAP
    - Sybase
    - Sybase ASE
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYBASE_USERNAME: SYBASE_USERNAME
      SYBASE_PASSWORD: SYBASE_PASSWORD

capability:
  consumes:
    - type: http
      namespace: sybase-ase
      baseUri: https://{server}:{port}/ase/v1
      description: "SAP ASE REST API for database administration and monitoring"
      authentication:
        type: basic
        username: "{{SYBASE_USERNAME}}"
        password: "{{SYBASE_PASSWORD}}"
      resources:
        - name: servers
          path: /servers
          description: SAP ASE server management
          operations:
            - name: list-servers
              method: GET
              description: "List ASE Servers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server-detail
          path: /servers/{serverId}
          description: Individual server operations
          operations:
            - name: get-server
              method: GET
              description: "Get Server Details"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server-status
          path: /servers/{serverId}/status
          description: Server operational status
          operations:
            - name: get-server-status
              method: GET
              description: "Get Server Status"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: databases
          path: /servers/{serverId}/databases
          description: Database management
          operations:
            - name: list-databases
              method: GET
              description: "List Databases"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-database
              method: POST
              description: "Create a Database"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Database name"
                - name: deviceName
                  in: body
                  type: string
                  required: true
                  description: "Storage device name"
                - name: sizeMB
                  in: body
                  type: number
                  required: true
                  description: "Initial size in MB"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: database-detail
          path: /servers/{serverId}/databases/{databaseName}
          description: Single database details
          operations:
            - name: get-database
              method: GET
              description: "Get Database Details"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: databaseName
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: performance
          path: /servers/{serverId}/performance
          description: Performance metrics
          operations:
            - name: get-performance-metrics
              method: GET
              description: "Get Performance Metrics"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: interval
                  in: query
                  type: integer
                  required: false
                  description: "Sampling interval in seconds (10-3600)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cache-metrics
          path: /servers/{serverId}/performance/cache
          description: Cache performance statistics
          operations:
            - name: get-cache-metrics
              method: GET
              description: "Get Cache Performance Metrics"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lock-metrics
          path: /servers/{serverId}/performance/locks
          description: Lock management statistics
          operations:
            - name: get-lock-metrics
              method: GET
              description: "Get Lock Activity Metrics"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: logins
          path: /servers/{serverId}/logins
          description: Server login management
          operations:
            - name: list-logins
              method: GET
              description: "List Server Logins"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-login
              method: POST
              description: "Create a Server Login"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Login name"
                - name: password
                  in: body
                  type: string
                  required: true
                  description: "Login password"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backups
          path: /servers/{serverId}/backups
          description: Backup operations
          operations:
            - name: list-backups
              method: GET
              description: "List Backup History"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-backup
              method: POST
              description: "Initiate a Database Backup"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: databaseName
                  in: body
                  type: string
                  required: true
                  description: "Database to back up"
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Backup type: full, transaction_log, incremental"
                - name: deviceName
                  in: body
                  type: string
                  required: true
                  description: "Backup device path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: devices
          path: /servers/{serverId}/devices
          description: Database device management
          operations:
            - name: list-devices
              method: GET
              description: "List Database Devices"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: configuration
          path: /servers/{serverId}/configuration
          description: Server configuration management
          operations:
            - name: get-configuration
              method: GET
              description: "Get Server Configuration"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: group
                  in: query
                  type: string
                  required: false
                  description: "Filter by configuration group"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-configuration
              method: PUT
              description: "Update Server Configuration"
              inputParameters:
                - name: serverId
                  in: path
                  type: string
                  required: true
                  description: "SAP ASE server ID"
                - name: parameters
                  in: body
                  type: array
                  required: true
                  description: "Configuration parameters to update"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sybase-ase-rest
      resources:
        - path: /v1/servers
          name: servers
          description: "List ASE servers"
          operations:
            - method: GET
              name: list-servers
              description: "List ASE Servers"
              call: "sybase-ase.list-servers"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/servers/{serverId}/databases
          name: databases
          description: "Manage databases"
          operations:
            - method: GET
              name: list-databases
              description: "List Databases"
              call: "sybase-ase.list-databases"
              with:
                serverId: "rest.serverId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/servers/{serverId}/performance
          name: performance
          description: "Get performance metrics"
          operations:
            - method: GET
              name: get-performance-metrics
              description: "Get Performance Metrics"
              call: "sybase-ase.get-performance-metrics"
              with:
                serverId: "rest.serverId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sybase-ase-mcp
      transport: http
      tools:
        - name: list-servers
          description: "List available SAP ASE server instances"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.list-servers"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-server
          description: "Get details for a specific SAP ASE server"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-server"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-server-status
          description: "Get current operational status, CPU, memory, and connections"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-server-status"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-databases
          description: "List all databases on a SAP ASE server"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.list-databases"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-database
          description: "Get details for a specific database including space usage"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-database"
          with:
            serverId: "tools.serverId"
            databaseName: "tools.databaseName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-performance-metrics
          description: "Get CPU, I/O, transaction rate, and connection metrics"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-performance-metrics"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-cache-metrics
          description: "Get data cache and procedure cache hit ratios and utilization"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-cache-metrics"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-lock-metrics
          description: "Get lock contention, deadlock counts, and wait times"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-lock-metrics"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-backups
          description: "List backup history for databases on a server"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.list-backups"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-backup
          description: "Initiate a full, transaction log, or incremental backup"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "sybase-ase.create-backup"
          with:
            serverId: "tools.serverId"
            databaseName: "tools.databaseName"
            type: "tools.type"
            deviceName: "tools.deviceName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-configuration
          description: "Get server configuration parameters (sp_configure equivalent)"
          hints:
            readOnly: true
            idempotent: true
          call: "sybase-ase.get-configuration"
          with:
            serverId: "tools.serverId"
          outputParameters:
            - type: object
              mapping: "$."
