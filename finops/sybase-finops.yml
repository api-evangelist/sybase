description: Sybase (SAP ASE, SQL Anywhere, IQ, Replication Server) is sold under SAP enterprise licensing.
  This artifact captures publisher and category surface only; meters are placeholders pending an SAP
  price list. There is no public per-call API meter.
sources:
  - https://www.sap.com/products/technology-platform/sybase-ase.html
notes: 'Reconciliation marked false: SAP/Sybase pricing is not public; sold via SAP sales and partner
  network under enterprise license metrics (core, named user, term).'
billingModel:
  pricingCategory: Enterprise License
  billingFrequency: Annual or Term
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Sybase
  ServiceCategory: Enterprise Database
  ProviderName: SAP
  PublisherName: SAP SE
  InvoiceIssuerName: SAP SE
  BillingCurrency: USD
meters:
  - name: license_metric
    description: SAP licensing metric used (core, CPU, named user, edition); cost realized through
      the customer's SAP order
    unit: varies
    aggregation: max
    dimensions:
      - product_edition
      - license_type
  - name: maintenance_support
    description: SAP Enterprise Support / maintenance attached to the underlying license
    unit: year
    aggregation: sum
    dimensions:
      - product_edition
principles:
  - name: Visibility
    description: Visibility into Sybase spend is via the SAP order schedule and SAP for Me account
      view; database server consumption is tracked via the SAP-provided usage measurement tools (LAW,
      USMM).
  - name: Allocation
    description: Allocate by SAP system ID and database; SAP licensing metrics tie directly to deployed
      cores or named users per system.
  - name: Optimization
    description: Optimization levers are right-sizing cores, consolidating non-prod ASE/IQ instances,
      moving from perpetual to subscription where the workload is contracting, and migrating cold workloads
      to lower-cost editions.
  - name: Accountability
    description: Account ownership rests with the SAP Basis / database administration team and the
      contract owner negotiating with SAP.
