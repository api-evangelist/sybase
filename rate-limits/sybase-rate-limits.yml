specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sybase
providerId: sybase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Database
  - Enterprise
  - SAP
  - SQL
  - Rate Limiting
description: Sybase products (SAP ASE, SQL Anywhere, IQ, Replication Server) are databases rather than
  REST/HTTP API services; they expose connection-level concurrency controls (max connections, locks,
  resource governor) configured by the DBA, not a public rate-limit policy.
sources:
  - https://www.sap.com/products/technology-platform/sybase-ase.html
notes: 'Reconciliation marked false: not an HTTP API surface. There is no public rate-limits doc; concurrency
  is configured at the database server level by the customer DBA.'
limits:
  - name: Database Server Concurrency
    scope: server
    metric: concurrent_connections
    limit: configured per database server (max connections, lock and resource limits set by DBA)
    notes: SAP ASE and related Sybase servers are tuned via sp_configure for max user connections,
      lock thresholds, and resource governor; there is no vendor-published per-second rate.
policies:
  - name: DBA-Configured Limits
    description: Concurrent connections, lock counts, and resource governor are set per server by the
      customer DBA; there is no public rate-limit policy.
maintainers:
