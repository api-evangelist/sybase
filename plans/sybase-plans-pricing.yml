description: Sybase, now part of SAP, ships enterprise database products (notably SAP Adaptive Server
  Enterprise / ASE, SQL Anywhere, IQ, Replication Server). Licensing is enterprise SAP-style — contract-sales
  with options for perpetual, term, and subscription licenses sold by core or named-user metric. There
  is no public per-call API tier.
sources:
  - https://www.sap.com/products/technology-platform/sybase-ase.html
notes: 'Reconciliation marked false: SAP does not publish a public price list for SAP/Sybase ASE. Pricing
  is via SAP sales and partners and varies by region, license metric (core/named user), and edition.
  No developer/API per-call tier exists.'
plans:
